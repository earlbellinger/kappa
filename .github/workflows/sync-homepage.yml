name: Sync homepage app

"on":
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch homepage sync
        env:
          HOMEPAGE_DISPATCH_TOKEN: ${{ secrets.HOMEPAGE_DISPATCH_TOKEN }}
          APP_SLUG: "kappa"
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEPAGE_DISPATCH_TOKEN}" ]; then
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "::error::HOMEPAGE_DISPATCH_TOKEN is not set"
              exit 1
            fi
            echo "::warning::HOMEPAGE_DISPATCH_TOKEN is not set; skipping homepage sync"
            exit 0
          fi
          payload="$(printf '{"event_type":"tracked-app-updated","client_payload":{"app":"%s","repo":"%s","branch":"%s","sha":"%s"}}' "$APP_SLUG" "$SOURCE_REPO" "$SOURCE_BRANCH" "$SOURCE_SHA")"
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${HOMEPAGE_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/earlbellinger/earlbellinger.github.io/dispatches \
            -d "${payload}"
